# spring.application.name=activityservice
# spring.data.mongodb.uri=mongodb://localhost:27017/activitydb
# spring.data.mongodb.auto-index-creation=true
# server.port=8082
spring:
    application:
        name: activityservice

    mongodb:
        uri: mongodb://localhost:27017/activitydb
        database: activitydb
server:
    port: 8082
eureka:
    client:
        serviceUrl:
            defaultZone: http://localhost:8761/eureka/
rabbitmq:
    exchange:
        name: fitness.exchange
    queue:
        name: activity.queue
    routing:
        key: activity.tracking